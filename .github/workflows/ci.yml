name: CI Build and Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test_build_ffmpeg_dev:
    name: Test build-ffmpeg_dev.yml
    uses: ./.github/workflows/build-ffmpeg_dev.yml
    permissions:
      contents: read
    with:
      repo_url: https://git.ffmpeg.org/gitweb/ffmpeg.git
      ffmpeg_branch: master
      test_seconds: "8"
      custom_env: ""
      runner_image: ubuntu-latest
      use_devel_sources: false
      create_release: false
    secrets: inherit

  test_build_ffmpeg_indocker_dev:
    name: Test build-ffmpeg_indocker_dev.yml
    uses: ./.github/workflows/build-ffmpeg_indocker_dev.yml
    permissions:
      contents: read
    with:
      repo_url: https://git.ffmpeg.org/gitweb/ffmpeg.git
      ffmpeg_branch: master
      test_seconds: "8"
      custom_env: ""
      runner_image: ubuntu-latest
      container_image: ubuntu:devel
      use_devel_sources: false
      create_release: false
    secrets: inherit

  failure_summary:
    name: Failure Summary
    if: ${{ always() && (needs.test_build_ffmpeg_dev.result == 'failure' || needs.test_build_ffmpeg_indocker_dev.result == 'failure') }}
    needs:
      - test_build_ffmpeg_dev
      - test_build_ffmpeg_indocker_dev
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Generate summary for VS Code
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;

            const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: runId,
              per_page: 100
            });

            const failedJobs = jobsResp.data.jobs.filter((job) => job.conclusion === "failure");

            let body = "## CI Failure Summary\n\n";
            body += `- Run: ${runUrl}\n`;
            body += `- Commit: ${context.sha}\n\n`;

            if (failedJobs.length === 0) {
              body += "No failed jobs were detected from API, but workflow result is failure.\n";
            } else {
              body += "### Failed Jobs\n";
              for (const job of failedJobs) {
                body += `- ${job.name}: ${job.html_url}\n`;
                const failedSteps = (job.steps || []).filter((step) => step.conclusion === "failure");
                for (const step of failedSteps) {
                  body += `  - Step: ${step.name}\n`;
                }
              }
            }

            const summaryPath = `${process.env.RUNNER_TEMP}/ci-failure-summary.md`;
            fs.writeFileSync(summaryPath, body, "utf8");
            core.summary.addRaw(body).write();

            if (context.eventName === "pull_request") {
              const issue_number = context.payload.pull_request.number;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-summary-${{ github.run_id }}
          path: ${{ runner.temp }}/ci-failure-summary.md
          if-no-files-found: error
          retention-days: 14
